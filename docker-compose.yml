version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: sports_edge_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sports_edge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sports_edge"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: sports_edge_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_URL=postgresql+asyncpg://admin:password@postgres:5432/sports_edge
    command: python core/scheduler.py

  dashboard:
    build: .
    container_name: sports_edge_dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_URL=postgresql+asyncpg://admin:password@postgres:5432/sports_edge
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  postgres_data:
